version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: service-assurance-postgres
    environment:
      POSTGRES_USER: service_assurance
      POSTGRES_PASSWORD: service_assurance
      POSTGRES_DB: service_assurance
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_assurance"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres-data:
