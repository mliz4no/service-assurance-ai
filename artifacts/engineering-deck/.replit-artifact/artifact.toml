kind = "slides"
previewPath = "/engineering-deck/"
title = "Service Assurance AI — Engineering Deck"
version = "1.0.0"
id = "artifacts/engineering-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/engineering-deck/" ]
localPort = 18748

[services.development]
run = "pnpm --filter @workspace/engineering-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/engineering-deck", "run", "build" ]
publicDir = "artifacts/engineering-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18748"
BASE_PATH = "/engineering-deck/"
