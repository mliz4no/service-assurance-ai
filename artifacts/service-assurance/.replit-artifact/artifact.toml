kind = "web"
previewPath = "/"
title = "Service Assurance AI"
version = "1.0.0"
id = "artifacts/service-assurance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25503

[services.development]
run = "pnpm --filter @workspace/service-assurance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/service-assurance", "run", "build" ]
publicDir = "artifacts/service-assurance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25503"
BASE_PATH = "/"
